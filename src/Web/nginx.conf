# Preserve the real client protocol across the Caddy -> nginx hop. Caddy terminates TLS and forwards
# X-Forwarded-Proto=https, but this nginx is reached over plain http on the internal Docker network, so
# $scheme is "http". Passing $scheme downstream made the API see http and issue the auth cookie WITHOUT
# the Secure flag in production. Honor the incoming header when present, falling back to $scheme only for
# a direct (proxy-less) request.
map $http_x_forwarded_proto $fwd_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ---- Hardening: defensive response headers (applied to every response) ----
    # Clickjacking + MIME-sniffing + referrer leakage protections. These are safe for the
    # Google Identity flow: X-Frame-Options governs who may frame *us*, not iframes we embed.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Permissions-Policy: the app's own opt-in features use these APIs, so 'self' must be allow-listed
    # (an empty () would deny them even to our own origin). geolocation = GPS location tracking,
    # microphone = voice food-logging. camera stays denied (self()) since nothing uses it. All three
    # remain denied to cross-origin frames.
    add_header Permissions-Policy "geolocation=(self), microphone=(self), camera=()" always;

    # ---- Content-Security-Policy: defense-in-depth against XSS / token theft ----
    # Restrictive baseline: everything is 'self' unless a real dependency needs more.
    #  * script-src has NO 'unsafe-inline' — an injected <script> or on*= handler cannot run. The three
    #    inline bootstrap scripts in index.html (theme / keyboard-inset / self-heal) are allowed by their
    #    exact SHA-256 hashes instead. IMPORTANT: if any of those inline scripts change, regenerate the
    #    hashes (sha256, base64, over the exact bytes between <script> and </script> of the BUILT
    #    dist/.../index.html) and update the tokens below, or the app will fail to boot. The Angular bundle
    #    (main-*.js) and the GSI library load from 'self' / the Google origin respectively.
    #  * style-src keeps 'unsafe-inline' (Angular/Material inject component styles at runtime) and adds the
    #    GSI stylesheet origin so the Google sign-in button renders (Google's documented CSP requirement).
    #  * connect-src allows self (same-origin /api proxy + SignalR WS) and the Google token endpoints.
    #  * frame-src/frame-ancestors: allow the GSI iframe, but forbid anyone from framing us
    #    (mirrors X-Frame-Options DENY). object-src 'none' kills legacy plugin vectors.
    # TEMPORARILY report-only: the enforcing CSP (which only started actually applying once the
    # add_header->expires inheritance fix landed) is being diagnosed for an icon-font/render regression.
    # Report-Only enforces NOTHING (so the app renders normally) but still logs every would-be violation
    # to the browser console, which pinpoints the exact resource to allow before re-enabling enforcement.
    add_header Content-Security-Policy-Report-Only "default-src 'self'; script-src 'self' 'sha256-bjksUaZvr3FHSmMwSyf6zkb2atDD+rDiFS7Cf4KJFvY=' 'sha256-bhdUQ5E6rBVNtdQhm13ePEcdti3CNn3WHVQ4+hnoOmw=' 'sha256-K3VUW+CdivRyOz7FsILmwRNw/UIvz+aJ63kNSnC0c4o=' https://accounts.google.com/gsi/; connect-src 'self' https://accounts.google.com/gsi/; img-src 'self' data: https:; style-src 'self' 'unsafe-inline' https://accounts.google.com/gsi/style; font-src 'self' data:; frame-src https://accounts.google.com/gsi/; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self'" always;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/wasm font/woff2;

    # Proxy API calls to the api service on the compose network.
    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $fwd_proto;
        # WebSocket upgrade so the SignalR chat hub (/api/hubs/chat) can use a real WS transport
        # rather than falling back to long-polling. Harmless for ordinary HTTP API calls.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Sync can take a while on the first ingest; also keeps idle WS connections alive.
        proxy_read_timeout 600s;
    }

    # Long-cache fingerprinted build assets (Angular emits content-hashed file names).
    # NOTE: uses `expires` (NOT `add_header`) for cache control on purpose — an `add_header` here would
    # RESET nginx header inheritance and silently drop every server-level security header (CSP etc.) on
    # these responses. `expires` sets Cache-Control without touching inheritance, so the security headers
    # above still apply.
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        try_files $uri =404;
        expires 1y;
    }

    # SPA fallback. index.html must never be cached so a deploy is picked up immediately. Again `expires`
    # (not `add_header`) so the server-level security headers — critically the CSP — are NOT dropped on the
    # main HTML document (an `add_header` here previously cancelled all of them for index.html).
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
    }
}
