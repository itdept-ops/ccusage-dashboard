<header class="mnav" [class.scrolled]="scrolled()">
  <div class="mnav-inner">
    <a class="brand" routerLink="/login" (click)="close()" aria-label="Usage IQ home">
      <svg class="brand-logo" width="26" height="26" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <radialGradient id="mnav-core" cx="50%" cy="36%" r="68%">
            <stop offset="0%" stop-color="#fbf3ff" /><stop offset="34%" stop-color="#c79bff" /><stop offset="68%" stop-color="#7e63f4" /><stop offset="100%" stop-color="#4a37c4" />
          </radialGradient>
          <linearGradient id="mnav-sq" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#241c52" /><stop offset="100%" stop-color="#0a081e" />
          </linearGradient>
        </defs>
        <rect x="4" y="4" width="56" height="56" rx="16" fill="url(#mnav-sq)" stroke="rgba(176,107,255,.42)" stroke-width="1.2" />
        <ellipse cx="32" cy="32" rx="19" ry="19" fill="none" stroke="rgba(176,107,255,.28)" stroke-width="1.4" />
        <ellipse cx="32" cy="32" rx="12.5" ry="12.5" fill="none" stroke="rgba(52,227,232,.20)" stroke-width="1.1" />
        <circle cx="32" cy="32" r="8.5" fill="url(#mnav-core)" />
        <circle cx="45.5" cy="18.5" r="2.7" fill="#34e3e8" />
      </svg>
      <span class="brand-word">Usage&nbsp;IQ</span>
    </a>

    @if (menuOpen()) {
      <div class="mnav-scrim" (click)="close()" aria-hidden="true"></div>
    }

    <nav #drawer id="mnav-drawer" class="mnav-links" [class.open]="menuOpen()" aria-label="Primary"
         (keydown)="onKeydown($event)">
      @for (l of links; track l.path) {
        <a [routerLink]="l.path" routerLinkActive="active" [routerLinkActiveOptions]="l.opts"
           (click)="close()">{{ l.label }}</a>
      }
      <a class="mnav-cta mobile-only" routerLink="/signin" (click)="close()">Sign in</a>
    </nav>

    <div class="mnav-right">
      <a class="gh" href="https://github.com/itdept-ops/usage-iq" target="_blank" rel="noopener" aria-label="GitHub">
        <mat-icon aria-hidden="true">code</mat-icon>
      </a>
      <a class="mnav-cta desktop-only" routerLink="/signin">
        Sign in <span class="cta-arrow">→</span>
      </a>
      <button #burger type="button" class="mnav-burger" (click)="toggle()" [attr.aria-expanded]="menuOpen()" aria-controls="mnav-drawer" aria-label="Menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>
</header>
